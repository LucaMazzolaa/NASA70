<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA // Mappa Orbitale - Live Telemetry & Kepler</title>
    
    <style>
        :root {
            --bg-color: #050505;
            --orbit-color: rgba(255, 255, 255, 0.2);
            --planet-dot-color: #ffffff; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-color);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        /* ========================================================
           INTERFACCIA UI (TESTI E BOTTONI)
           ======================================================== */
        .overlay-ui {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 12px;
            color: #888;
            pointer-events: none;
            z-index: 100;
        }

        .overlay-ui h1 {
            color: white;
            font-size: 16px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .zoom-checkbox { display: none; }

        .zoom-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border: 1px solid #555;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            z-index: 200;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .zoom-btn:hover {
            border-color: #fff;
            background: #222;
        }

        .txt-out { display: none; }
        .zoom-checkbox:checked ~ .zoom-btn .txt-in { display: none; }
        .zoom-checkbox:checked ~ .zoom-btn .txt-out { display: inline; }

        /* ========================================================
           CONTENITORE MAPPA E TRANSIZIONI
           ======================================================== */
        .map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sun, .orbit, .planet {
            transition: width 3s cubic-bezier(0.25, 1, 0.5, 1), 
                        height 3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* ========================================================
           IL SOLE E I PIANETI (STILE UNIFICATO E SENZA NEON)
           ======================================================== */
        .sun {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            z-index: 10;
            /* Rimosso il box-shadow per eliminare l'effetto neon */
        }
        
        .sun::after {
            content: attr(data-name);
            position: absolute;
            left: 150%;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.4vmin;
            color: #888;
            letter-spacing: 1px;
            pointer-events: none;
            opacity: 1; 
            white-space: nowrap; 
        }

        /* L'orbita ruota in base all'angolo calcolato dal JS */
        .orbit {
            position: absolute;
            border: 1px dashed var(--orbit-color);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(var(--angle, 0deg));
            will-change: transform; 
        }

        /* Il pianeta controruota per tenere le scritte sempre in orizzontale */
        .planet {
            position: absolute;
            border-radius: 50%;
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%) rotate(calc(-1 * var(--angle, 0deg)));
            background-color: var(--planet-dot-color); 
            will-change: transform;
        }

        .planet::after {
            content: attr(data-name);
            position: absolute;
            left: 150%;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.4vmin;
            color: #888;
            letter-spacing: 1px;
            pointer-events: none;
            opacity: 0; /* Di base nascoste, le attiviamo nello zoom */
            transition: opacity 1.5s ease;
            white-space: nowrap; 
        }

        /* ========================================================
           STATO 1: ZOOM IN (VISIONE SISTEMA INTERNO)
           ======================================================== */
        .sun { width: 1.2vmin; height: 1.2vmin; }
        .planet { width: 1.2vmin; height: 1.2vmin; }
        
        .orb-mercury { width: 31.2vmin; height: 31.2vmin; }
        .orb-venus { width: 57.6vmin; height: 57.6vmin; }
        .orb-earth { width: 80vmin; height: 80vmin; }
        .orb-mars { width: 121.6vmin; height: 121.6vmin; }
        
        .orb-jupiter { width: 416vmin; height: 416vmin; }
        .orb-saturn { width: 766vmin; height: 766vmin; }
        .orb-uranus { width: 1536vmin; height: 1536vmin; }
        .orb-neptune { width: 2408vmin; height: 2408vmin; }

        /* Mostro solo i nomi interni */
        .pl-mercury::after, .pl-venus::after, .pl-earth::after, .pl-mars::after { opacity: 1; }

        /* ========================================================
           STATO 2: ZOOM OUT (VISIONE COMPLETA SISTEMA)
           ======================================================== */
        .zoom-checkbox:checked ~ .map-container .sun { width: 0.6vmin; height: 0.6vmin; }
        .zoom-checkbox:checked ~ .map-container .planet { width: 0.6vmin; height: 0.6vmin; }

        .zoom-checkbox:checked ~ .map-container .orb-mercury { width: 1.17vmin; height: 1.17vmin; }
        .zoom-checkbox:checked ~ .map-container .orb-venus { width: 2.16vmin; height: 2.16vmin; }
        .zoom-checkbox:checked ~ .map-container .orb-earth { width: 3vmin; height: 3vmin; }
        .zoom-checkbox:checked ~ .map-container .orb-mars { width: 4.56vmin; height: 4.56vmin; }
        
        .zoom-checkbox:checked ~ .map-container .orb-jupiter { width: 15.6vmin; height: 15.6vmin; }
        .zoom-checkbox:checked ~ .map-container .orb-saturn { width: 28.7vmin; height: 28.7vmin; }
        .zoom-checkbox:checked ~ .map-container .orb-uranus { width: 57.6vmin; height: 57.6vmin; }
        .zoom-checkbox:checked ~ .map-container .orb-neptune { width: 90.3vmin; height: 90.3vmin; }

        /* Nascondo nomi interni per evitare che si sovrappongano, mostro esterni */
        .zoom-checkbox:checked ~ .map-container .pl-mercury::after, 
        .zoom-checkbox:checked ~ .map-container .pl-venus::after, 
        .zoom-checkbox:checked ~ .map-container .pl-earth::after, 
        .zoom-checkbox:checked ~ .map-container .pl-mars::after { opacity: 0; }

        .zoom-checkbox:checked ~ .map-container .pl-jupiter::after, 
        .zoom-checkbox:checked ~ .map-container .pl-saturn::after, 
        .zoom-checkbox:checked ~ .map-container .pl-uranus::after, 
        .zoom-checkbox:checked ~ .map-container .pl-neptune::after { opacity: 1; }

    </style>
</head>
<body>

    <input type="checkbox" id="zoom-toggle" class="zoom-checkbox">

    <div class="overlay-ui">
        <h1>NASA // MAPPA TELEMETRICA LIVE</h1>
        <p>Proporzioni 1:1 in AU // <span id="live-date" style="color: #fff;">Calcolo posizioni...</span></p>
        <p>Motore Kepleriano attivo (Epoca J2000). Posizioni reali in tempo reale.</p>
    </div>

    <label for="zoom-toggle" class="zoom-btn">
        <span class="txt-in">[ - ] ZOOM OUT: VISIONE COMPLETA</span>
        <span class="txt-out">[ + ] ZOOM IN: VISIONE SISTEMA INTERNO</span>
    </label>

    <div class="map-container">
        <div class="sun" data-name="[SOLE]"></div>
        
        <div class="orbit orb-mercury"><div class="planet pl-mercury" data-name="[MERCURIO]"></div></div>
        <div class="orbit orb-venus"><div class="planet pl-venus" data-name="[VENERE]"></div></div>
        <div class="orbit orb-earth"><div class="planet pl-earth" data-name="[TERRA]"></div></div>
        <div class="orbit orb-mars"><div class="planet pl-mars" data-name="[MARTE]"></div></div>
        
        <div class="orbit orb-jupiter"><div class="planet pl-jupiter" data-name="[GIOVE]"></div></div>
        <div class="orbit orb-saturn"><div class="planet pl-saturn" data-name="[SATURNO]"></div></div>
        <div class="orbit orb-uranus"><div class="planet pl-uranus" data-name="[URANO]"></div></div>
        <div class="orbit orb-neptune"><div class="planet pl-neptune" data-name="[NETTUNO]"></div></div>
    </div>

    <script>
        // Parametri Orbitali Epoca J2000 (Fonte: NASA JPL)
        // a = semiasse maggiore (AU)
        // e = eccentricità (quanto l'orbita è schiacciata)
        // M0 = anomalia media a J2000 (gradi)
        // w = longitudine del perielio (gradi)
        // n = moto medio giornaliero (gradi/giorno)
        const keplerData = {
            'mercury': { a: 0.387, e: 0.2056, M0: 174.796, w: 77.456, n: 4.092317 },
            'venus':   { a: 0.723, e: 0.0067, M0: 50.115,  w: 131.532, n: 1.602130 },
            'earth':   { a: 1.000, e: 0.0167, M0: 357.529, w: 102.947, n: 0.985608 },
            'mars':    { a: 1.524, e: 0.0934, M0: 19.387,  w: 336.040, n: 0.524020 },
            'jupiter': { a: 5.203, e: 0.0485, M0: 19.650,  w: 14.753,  n: 0.083085 },
            'saturn':  { a: 9.555, e: 0.0555, M0: 317.020, w: 92.431,  n: 0.033444 },
            'uranus':  { a: 19.22, e: 0.0464, M0: 142.238, w: 170.964, n: 0.011725 },
            'neptune': { a: 30.11, e: 0.0090, M0: 256.228, w: 44.971,  n: 0.005981 }
        };

        const liveDateElement = document.getElementById('live-date');
        const j2000 = new Date('2000-01-01T12:00:00Z');

        // Risolutore iterativo dell'Equazione di Keplero (Metodo di Newton-Raphson)
        // Permette di calcolare la posizione esatta su un'ellisse, invece che su un cerchio perfetto
        function solveKepler(M, e) {
            let E = M; // Stima iniziale
            let delta = 1;
            while (Math.abs(delta) > 1e-6) {
                delta = (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
                E -= delta;
            }
            return E;
        }

        // Funzione di aggiornamento in tempo reale
        function updateTelemetry() {
            const now = new Date();
            
            // Stampa orario e data aggiornati al millisecondo
            liveDateElement.innerText = `[${now.toLocaleDateString()} - ${now.toLocaleTimeString()}]`;

            // Calcolo esatto dei giorni trascorsi dal 1 Gennaio 2000
            const daysSinceJ2000 = (now - j2000) / (1000 * 60 * 60 * 24);

            for (const [planetId, data] of Object.entries(keplerData)) {
                
                // 1. Calcolo dell'Anomalia Media (M)
                let M_deg = (data.M0 + data.n * daysSinceJ2000) % 360;
                let M_rad = M_deg * Math.PI / 180;

                // 2. Troviamo l'Anomalia Eccentrica (E) risolvendo Keplero
                let E_rad = solveKepler(M_rad, data.e);

                // 3. Calcolo dell'Anomalia Vera (v) - Tiene conto delle accelerazioni orbitali
                let trueAnomalyRad = 2 * Math.atan2(
                    Math.sqrt(1 + data.e) * Math.sin(E_rad / 2),
                    Math.sqrt(1 - data.e) * Math.cos(E_rad / 2)
                );
                let trueAnomalyDeg = trueAnomalyRad * 180 / Math.PI;

                // 4. Calcolo della Longitudine Vera (Angolo finale sulla mappa rispetto al Sole)
                let currentAngle = (trueAnomalyDeg + data.w) % 360;
                if (currentAngle < 0) currentAngle += 360; 

                // 5. Applica l'angolo ai cerchi CSS tramite le variabili Custom
                const orbitEl = document.querySelector(`.orb-${planetId}`);
                const planetEl = document.querySelector(`.pl-${planetId}`);
                
                if (orbitEl && planetEl) {
                    orbitEl.style.setProperty('--angle', `${currentAngle}deg`);
                    planetEl.style.setProperty('--angle', `${currentAngle}deg`);
                }
            }

            // Loop continuo a 60 frame al secondo
            requestAnimationFrame(updateTelemetry);
        }

        // Avvio del motore al caricamento
        updateTelemetry();
    </script>
</body>
</html>
